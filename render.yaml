services:
  - type: web
    name: velina-backend
    runtime: python
    rootDir: backend
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this manually in the Render Dashboard
